services:
  - type: web
    name: mathlite
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.4
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB
        value: mathlite
